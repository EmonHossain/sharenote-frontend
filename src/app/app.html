@if (restoringSession()) {
  <main class="auth-loading-shell" aria-label="Restoring session">
    <div class="brand-mark loading-mark"><span></span><span></span><span></span></div>
    <span>Restoring your secure session…</span>
  </main>
} @else if (auth.session(); as activeSession) {
  @if (activeSession.accessLevel === 'full') {
    <app-workspace
      [username]="activeSession.user.username"
      [displayName]="activeSession.user.firstName + ' ' + activeSession.user.lastName"
      [futureOrganizationIdRequired]="activeSession.futureOrganizationIdRequired"
      (logout)="handleLogout()"
    />
  } @else {
    <app-verification
      [session]="activeSession"
      [busy]="auth.busy()"
      [apiError]="auth.error()"
      [notice]="notice()"
      (verifyEmail)="handleEmailVerification($event)"
      (resendEmail)="handleResendEmail()"
      (organizationIdSelected)="handleOrganizationId($event)"
      (personalFileSelected)="handlePersonalFile($event)"
      (logout)="handleLogout()"
    />
  }
} @else if (authView() === 'registration') {
  <app-registration
    [busy]="auth.busy()"
    [apiError]="auth.error()"
    (register)="handleRegistration($event)"
    (loginRequested)="authView.set('login')"
  />
} @else {
  <app-login
    [busy]="auth.busy()"
    [apiError]="auth.error()"
    (login)="handleLogin($event)"
    (registrationRequested)="authView.set('registration')"
  />
}
